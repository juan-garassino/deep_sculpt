services:
  mlflow:
    build:
      context: .
      dockerfile: services/mlflow/Dockerfile
    environment:
      PORT: "8080"
      BACKEND_STORE_URI: sqlite:///mlflow-data/mlflow.db
      ARTIFACT_ROOT: /mlflow-data/mlruns
    ports:
      - "8080:8080"
    volumes:
      - mlflow-data:/mlflow-data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  trainer:
    build:
      context: .
      dockerfile: services/trainer/Dockerfile
    env_file: .env.docker
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:8080
    volumes:
      - models:/app/models
      - ./data:/app/data:ro
    depends_on:
      mlflow:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  mlflow-data:
  models:
